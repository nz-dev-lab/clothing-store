name: Deploy

# Triggers when a commit is pushed to main (i.e. development → main PR is merged).
# This is the production deployment pipeline.
#
# Required secrets (add in GitHub → Settings → Secrets → Actions):
#   DO_SSH_KEY       — private SSH key (corresponding public key is on the server)
#   DO_SSH_HOST      — 167.71.229.24
#   DO_SSH_USER      — root
#   DO_WP_PATH       — /var/www/html  (path inside the Docker container)

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build JS bundle ───────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: wp-content/themes/clothing-store-child/package-lock.json

      - name: Build React bundle
        run: |
          npm ci
          npm run build
        working-directory: wp-content/themes/clothing-store-child

      # ── Deploy via rsync ──────────────────────────────────────────────────
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DO_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy custom theme
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='src' \
            --exclude='*.ts' \
            --exclude='*.tsx' \
            --exclude='tailwind.config.*' \
            --exclude='postcss.config.*' \
            --exclude='vite.config.*' \
            --exclude='package*.json' \
            wp-content/themes/clothing-store-child/ \
            ${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}:/opt/hira-fashions/wp-content/themes/clothing-store-child/

      - name: Deploy custom plugin
        run: |
          rsync -avz --delete \
            wp-content/plugins/clothing-store-custom/ \
            ${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}:/opt/hira-fashions/wp-content/plugins/clothing-store-custom/

      - name: Flush cache
        run: |
          ssh ${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }} \
            "docker exec hira_wp wp --allow-root --path=/var/www/html cache flush"
