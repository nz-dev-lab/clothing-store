services:

  db:
    image: mysql:8.0
    container_name: clothing_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wpuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wppass}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    image: wordpress:6.5-php8.2-apache
    container_name: clothing_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DB_USER: ${MYSQL_USER:-wpuser}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wppass}
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('WP_MEMORY_LIMIT', '256M');
    volumes:
      # Your custom theme and plugin are mounted live — edit locally, reflects instantly
      - ./wp-content/themes/clothing-store-child:/var/www/html/wp-content/themes/clothing-store-child
      - ./wp-content/plugins/clothing-store-custom:/var/www/html/wp-content/plugins/clothing-store-custom
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      # Persist uploaded media and installed plugins between container restarts
      - wp_uploads:/var/www/html/wp-content/uploads
      - wp_plugins:/var/www/html/wp-content/plugins
      - wp_themes:/var/www/html/wp-content/themes
    networks:
      - wp_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: clothing_pma
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-wpuser}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-wppass}
    networks:
      - wp_net

  # WP-CLI — run one-off commands: docker compose run --rm wpcli wp plugin list
  wpcli:
    image: wordpress:cli-php8.2
    container_name: clothing_wpcli
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DB_USER: ${MYSQL_USER:-wpuser}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wppass}
    volumes:
      - ./wp-content/themes/clothing-store-child:/var/www/html/wp-content/themes/clothing-store-child
      - ./wp-content/plugins/clothing-store-custom:/var/www/html/wp-content/plugins/clothing-store-custom
      - wp_uploads:/var/www/html/wp-content/uploads
      - wp_plugins:/var/www/html/wp-content/plugins
      - wp_themes:/var/www/html/wp-content/themes
    networks:
      - wp_net
    user: "33:33"

volumes:
  db_data:
  wp_uploads:
  wp_plugins:
  wp_themes:

networks:
  wp_net:
    driver: bridge
